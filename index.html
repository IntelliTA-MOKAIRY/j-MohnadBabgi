  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="counter">
      <h1>Counter</h1>
      <div id="count" class="count">0</div>
      <div class="buttons">
        <button id="decreaseBtn" class="btn btn--minus" aria-label="decrease">−</button>
        <button id="increaseBtn" class="btn btn--plus" aria-label="increase">+</button>
      </div>
    </main>
    <script src="counter.js"></script>
  </body>
  </html>
